server:
  port: 8080

spring:
  application:
    name: learning-platform
  datasource:
    url: jdbc:h2:mem:securitydb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

# Custom Security Configuration
security:
  # The active authentication strategy: 'jwt' or 'session'
  auth: jwt
  # The active authorization strategy: 'rbac' or 'abac'
  authorization: rbac
  # JWT properties
  jwt:
    # Use a secure, long secret in production. This is just for learning.
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 3600000 # 1 hour
  # Feature flags
  mfa:
    enabled: false
  rate-limit:
    enabled: true
    # Increased limits to prevent tests from failing locally due to TOO_MANY_REQUESTS
    capacity: 1000
    refill-tokens: 1000
    refill-duration-seconds: 60
